apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: scalex-federation-releases
  namespace: argo
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/SJoon99/scalex-federation.git
              revision: experiment/single-values-catalog
              files:
                - path: values.yaml
          - list:
              elementsYaml: '{{ .releases | toJson }}'
      selector:
        matchLabels:
          state: active
  template:
    metadata:
      name: 'federation-{{ .environment }}-{{ .name }}'
      namespace: argo
      labels:
        app.kubernetes.io/part-of: scalex-federation
        scalex.io/environment: '{{ .environment }}'
        scalex.io/release: '{{ .name }}'
    spec:
      project: scalex-federation
      source:
        repoURL: '{{ .source.repoURL }}'
        targetRevision: '{{ .source.revision }}'
        path: '{{ .source.path }}'
        helm:
          releaseName: '{{ .helm.releaseName }}'
          values: '{{ .helm.values }}'
      destination:
        name: '{{ .destination.name }}'
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
