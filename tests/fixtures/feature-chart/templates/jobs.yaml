apiVersion: batch/v1
kind: Job
metadata:
  name: rgw-analysis-web-dataset-seeder
  labels:
    scalex.io/release: rgw-analysis-web
    scalex.io/component: dataset-seeder
spec:
  template:
    metadata:
      labels:
        scalex.io/release: rgw-analysis-web
        scalex.io/component: dataset-seeder
    spec:
      restartPolicy: Never
      containers:
        - name: flow
          image: "{{ .Values.images.flow.repository }}:{{ .Values.images.flow.tag }}@{{ .Values.images.flow.digest }}"
          command: ["smurf-flow", "seed"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rgw-analysis-web-analyzer
  labels:
    scalex.io/release: rgw-analysis-web
    scalex.io/component: analyzer
spec:
  template:
    metadata:
      labels:
        scalex.io/release: rgw-analysis-web
        scalex.io/component: analyzer
    spec:
      restartPolicy: Never
      containers:
        - name: flow
          image: "{{ .Values.images.flow.repository }}:{{ .Values.images.flow.tag }}@{{ .Values.images.flow.digest }}"
          command: ["smurf-flow", "analyze"]
