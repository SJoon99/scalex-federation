apiVersion: apps/v1
kind: Deployment
metadata:
  name: rgw-analysis-web-result-web
  labels:
    scalex.io/release: rgw-analysis-web
    scalex.io/component: result-web
spec:
  replicas: {{ .Values.resultWeb.replicas }}
  selector:
    matchLabels:
      scalex.io/release: rgw-analysis-web
      scalex.io/component: result-web
  template:
    metadata:
      labels:
        scalex.io/release: rgw-analysis-web
        scalex.io/component: result-web
    spec:
      containers:
        - name: web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}@{{ .Values.images.web.digest }}"
        - name: result-sync
          image: "{{ .Values.images.flow.repository }}:{{ .Values.images.flow.tag }}@{{ .Values.images.flow.digest }}"
          command: ["smurf-flow", "fetch"]
---
apiVersion: v1
kind: Service
metadata:
  name: rgw-analysis-web-result-web
  annotations:
{{ toYaml .Values.resultWeb.service.annotations | indent 4 }}
  labels:
    scalex.io/release: rgw-analysis-web
    scalex.io/component: result-web
spec:
  type: ClusterIP
  selector:
    scalex.io/release: rgw-analysis-web
    scalex.io/component: result-web
  ports:
    - name: http
      port: {{ .Values.resultWeb.service.port }}
      targetPort: {{ .Values.resultWeb.service.targetPort }}
