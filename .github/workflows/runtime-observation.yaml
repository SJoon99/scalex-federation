name: Federation Runtime Observation

on:
  workflow_run:
    workflows:
      - Federation Validation
    types:
      - completed
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scalex-release-runtime-observation
  cancel-in-progress: false

env:
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69
  KARMADA_CONTEXT: karmada
  MEMBER_CONTEXTS: b,c

jobs:
  observe:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    environment: scalex-release
    runs-on:
      - self-hosted
      - linux
      - scalex-management
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out observed desired state
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'refs/heads/main' }}
          persist-credentials: false

      - name: Install checksum-verified yq
        shell: bash
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/scalex-tools"
          mkdir -p "$tools"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            --output "$tools/yq"
          printf '%s  %s\n' "$YQ_SHA256" "$tools/yq" | sha256sum --check --strict
          chmod 0755 "$tools/yq"
          printf '%s\n' "$tools" >> "$GITHUB_PATH"

      - name: Observe merged release without changing desired state
        shell: bash
        env:
          SCALEX_RELEASE_KUBECONFIG: ${{ secrets.SCALEX_RELEASE_KUBECONFIG }}
          OBSERVE_ATTEMPTS: "30"
          OBSERVE_INTERVAL_SECONDS: "10"
        run: |
          set -euo pipefail
          set +x
          umask 077
          kubeconfig="$RUNNER_TEMP/scalex-release.kubeconfig"
          install -m 0600 /dev/null "$kubeconfig"
          printf '%s' "$SCALEX_RELEASE_KUBECONFIG" > "$kubeconfig"
          unset SCALEX_RELEASE_KUBECONFIG
          test -s "$kubeconfig"
          KUBECONFIG="$kubeconfig" ./scripts/rgw-analysis-web/observe-release.sh poc rgw-analysis-web
          KUBECONFIG="$kubeconfig" ./scripts/rgw-analysis-web/observe-release.sh cuty rgw-analysis-web

      - name: Remove ephemeral kubeconfig
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/scalex-release.kubeconfig"
