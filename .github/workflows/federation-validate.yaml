name: Federation Validation

on:
  # Automatic CI validation is temporarily disabled while the validation path
  # is being shortened. Re-enable pull_request/push only after that work lands.
  # pull_request: {}
  # push:
  #   branches:
  #     - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: federation-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  HELM_VERSION: v3.18.6
  HELM_SHA256: 3f43c0aa57243852dd542493a0f54f1396c0bc8ec7296bbb2c01e802010819ce
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69
  CHECK_JSONSCHEMA_VERSION: 0.33.3
  PYTHON_VERSION: 3.13.13

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out Federation source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: false
          version: 0.11.16

      - name: Install pinned validation tools
        shell: bash
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/scalex-tools"
          mkdir -p "$tools"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
            --output "$RUNNER_TEMP/helm.tar.gz"
          printf '%s  %s\n' "$HELM_SHA256" "$RUNNER_TEMP/helm.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file "$RUNNER_TEMP/helm.tar.gz" --directory "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/linux-amd64/helm" "$tools/helm"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            --output "$tools/yq"
          printf '%s  %s\n' "$YQ_SHA256" "$tools/yq" | sha256sum --check --strict
          chmod 0755 "$tools/yq"
          UV_TOOL_DIR="$RUNNER_TEMP/check-jsonschema-tools" UV_TOOL_BIN_DIR="$tools" \
            uv tool install --python "$PYTHON_VERSION" \
            "check-jsonschema==$CHECK_JSONSCHEMA_VERSION"
          test "$("$tools/check-jsonschema" --version)" = \
            "check-jsonschema, version $CHECK_JSONSCHEMA_VERSION"
          printf '%s\n' "$tools" >> "$GITHUB_PATH"

      - name: Resolve exact enrolled source revisions
        id: sources
        shell: bash
        run: |
          set -euo pipefail
          source_root="$RUNNER_TEMP/feature-sources"
          mkdir -p "$source_root"
          while IFS=$'\t' read -r repo_url chart_path revision; do
            [[ "$repo_url" =~ ^https://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+\.git$ ]]
            [[ "$revision" =~ ^[0-9a-f]{40}$ ]]
            test "$revision" != 0000000000000000000000000000000000000000
            REPO_URL="$repo_url" CHART_PATH="$chart_path" yq e -e '
              .repositories[] |
              select(.repoURL == strenv(REPO_URL)) |
              .paths[] == strenv(CHART_PATH)
            ' contracts/children.yaml >/dev/null
            repo_name="$(basename "${repo_url%.git}")"
            target="$source_root/$repo_name"
            if [ ! -d "$target/.git" ]; then
              git init --quiet "$target"
              git -C "$target" remote add origin "$repo_url"
            fi
            test "$(git -C "$target" remote get-url origin)" = "$repo_url"
            git -C "$target" fetch --quiet --no-tags origin "$revision"
            git -C "$target" checkout --quiet --detach "$revision"
            test "$(git -C "$target" rev-parse HEAD)" = "$revision"
            git -C "$target" rev-parse 'HEAD^{tree}'
          done < <(yq e -r -N '[.source.repoURL, .source.path, .source.revision] | @tsv' releases/*/*/release.yaml | sort -u)
          printf 'root=%s\n' "$source_root" >> "$GITHUB_OUTPUT"

      - name: Run exact-source Federation gates
        shell: bash
        env:
          FEATURE_REPOS_ROOT: ${{ steps.sources.outputs.root }}
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base_ref=""
          if [ "$EVENT_NAME" = pull_request ]; then
            base_ref="$PULL_REQUEST_BASE"
          elif [ "$EVENT_NAME" = push ] && [[ "$PUSH_BEFORE" =~ ^[0-9a-f]{40}$ ]] && \
            [ "$PUSH_BEFORE" != 0000000000000000000000000000000000000000 ]; then
            base_ref="$PUSH_BEFORE"
          fi
          VALIDATE_BASE_REF="$base_ref" ./scripts/validate.sh
          ./tests/test-storage-binding.sh
          ./scripts/rgw-analysis-web/verify-public-images.sh
          ./tests/contracts/test-script-boundaries.sh
          ./tests/contracts/test-release-contract.sh
          ./tests/contracts/test-validation-fixtures.sh
          ./tests/contracts/test-multi-release-coexistence.sh
          ./tests/ci/test-public-image-verification.sh
          ./tests/ci/test-workflows.sh
          ./tests/runtime-observation/test-observe-release.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck \
              scripts/rgw-analysis-web/observe-release.sh \
              scripts/rgw-analysis-web/verify-public-images.sh \
              scripts/lib/validate-release-schema.sh \
              scripts/sync-object-storage-binding.sh \
              tests/test-storage-binding.sh \
              tests/contracts/test-script-boundaries.sh \
              tests/ci/test-public-image-verification.sh \
              tests/runtime-observation/test-observe-release.sh \
              tests/fixtures/ci/fake-docker.sh \
              tests/fixtures/runtime-observation/fake-curl.sh \
              tests/fixtures/runtime-observation/fake-kubectl.sh
            shellcheck -e SC2016 tests/ci/test-workflows.sh
          fi

      - name: Confirm no credential or cluster mutation payload
        shell: bash
        run: |
          set -euo pipefail
          if git grep -InE '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|aws_secret_access_key[[:space:]]*=)' -- ':!tests/fixtures'; then
            echo 'credential-like payload found' >&2
            exit 1
          fi
          if git grep -InE 'kubectl[[:space:]].*(apply|create|delete|exec|patch|replace)' -- .github scripts/rgw-analysis-web; then
            echo 'cluster mutation command found in hosted CI path' >&2
            exit 1
          fi
