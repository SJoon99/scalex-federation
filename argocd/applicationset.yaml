apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: scalex-federation-releases
  namespace: argo
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/SJoon99/scalex-federation.git
        revision: main
        files:
          - path: releases/*/release.yaml
      selector:
        matchLabels:
          state: active
  template:
    metadata:
      name: 'federation-{{ .name }}'
      namespace: argo
      labels:
        app.kubernetes.io/part-of: scalex-federation
        scalex.io/release: '{{ .name }}'
    spec:
      project: scalex-federation
      sources:
        - repoURL: '{{ .source.repoURL }}'
          targetRevision: '{{ dig "source" "revision" (dig "promotion" "resolvedRevision" "" .) . }}'
          path: '{{ .source.path }}'
          helm:
            releaseName: '{{ .name }}'
            valueFiles:
              - '$federation/releases/{{ .name }}/runtime-values.yaml'
              - '$federation/{{ .values.path }}'
        - repoURL: https://github.com/SJoon99/scalex-federation.git
          targetRevision: main
          ref: federation
      destination:
        name: karmada
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            namespace.karmada.io/skip-auto-propagation: "true"
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
