apiVersion: scalex.io/v1alpha1
kind: FederationReleaseCatalog
metadata:
  name: scalex-federation-single-values
  annotations:
    scalex.io/experiment: single-values-catalog
    scalex.io/live-deployability: blocked-until-feature-charts-render-karmada-policies
releases:
  - name: scalex-feature-poc
    state: disabled
    disabledReason: >-
      The pinned chart does not render the required Karmada policies yet.
    namespace: scalex-feature-poc
    destination:
      name: karmada
    source:
      repoURL: https://github.com/SJoon99/scalex-feature-poc.git
      path: chart
      revision: 4e26773509ef2d38409d320f55956d24f0fa3377
    helm:
      releaseName: scalex-feature-poc
      values: |-
        releaseLabel: scalex-feature-poc

        s3:
          configMapName: rgw-analysis-web-runtime
          secretName: rgw-analysis-web-s3
          inputKey: input/dataset.csv
          resultPrefix: results/rgw-analysis-web
          resultJsonKey: results/rgw-analysis-web/result.json
          resultIndexKey: results/rgw-analysis-web/index.html
          waitSeconds: 600
          pollIntervalSeconds: 5
          syncIntervalSeconds: 10

        images:
          awsCli:
            repository: public.ecr.aws/aws-cli/aws-cli
            tag: "2.17.57"
            digest: sha256:603e86d34bbbba57bb1dfe1cc2ac5ef6eef0df1e0d0b953ee9b83a0f6cac3d59
            pullPolicy: IfNotPresent
          nginx:
            repository: nginx
            tag: "1.27.3-alpine"
            digest: sha256:814a8e88df978ade80e584cc5b333144b9372a8e3c98872d07137dbf3b44d0e4
            pullPolicy: IfNotPresent

        resultWeb:
          replicas: 1
          service:
            type: ClusterIP
            annotations:
              scalex.io/exposure: internal
            port: 80
            targetPort: 8080
  - name: scalex-feature-dataset-ingest
    state: disabled
    disabledReason: >-
      The example feature repository and immutable chart revision have not been promoted yet.
    namespace: scalex-feature-dataset-ingest
    destination:
      name: karmada
    source:
      repoURL: https://github.com/SJoon99/scalex-feature-dataset-ingest.git
      path: chart
      revision: REPLACE_WITH_FULL_GIT_SHA
    helm:
      releaseName: scalex-feature-dataset-ingest
      values: '{}'
