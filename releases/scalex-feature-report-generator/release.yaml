apiVersion: scalex.io/v1alpha2
kind: FederationRelease
name: scalex-feature-report-generator
namespace: scalex-feature-report-generator
state: disabled
disabledReason: >-
  The example feature repository and immutable chart revision have not been promoted yet.
renderer: helm/v1
source:
  repoURL: https://github.com/SJoon99/scalex-feature-report-generator.git
  path: chart
  revision: REPLACE_WITH_FULL_GIT_SHA
values:
  path: releases/scalex-feature-report-generator/values.yaml
promotion:
  mode: pinned
